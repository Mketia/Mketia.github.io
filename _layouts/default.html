<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ '/assets/css/main.scss' | relative_url }}" />

  {% feed_meta %}
  {% seo %}
</head>
<body>
  <div class="site-wrapper">

    <header class="site-header">
      <div class="nav-inner">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <nav>
          <ul class="site-nav">
            <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
            <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Writing</a></li>
            <li><a href="{{ '/projects/' | relative_url }}" {% if page.url == '/projects/' %}class="active"{% endif %}>Projects</a></li>
            <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
            <li><a href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}class="active"{% endif %}>Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <span>© {{ 'now' | date: '%Y' }} {{ site.author.name }}. All rights reserved.</span>
        <ul class="footer-links">
          <li><a href="{{ '/blog/' | relative_url }}">Writing</a></li>
          <li><a href="{{ '/about/' | relative_url }}">About</a></li>
          <li><a href="{{ site.github_url | default: '#' }}">GitHub</a></li>
        </ul>
      </div>
    </footer>

  </div>
</body>
</html>
